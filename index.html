<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienditax</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/wvwVpYgN/Gemini-Generated-Image-ho93mhho93mhho93-removebg-preview.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="loginPage" class="page page-center">
      <div class="card login-card">
        <img class="logo" src="https://i.postimg.cc/wvwVpYgN/Gemini-Generated-Image-ho93mhho93mhho93-removebg-preview.png" alt="Tienditax" />
        <h1>Tienditax</h1>
        <p class="subtitle">Acceso seguro para gestión y exportación de catálogos.</p>

        <form id="loginForm" class="stack-12">
          <label class="field-label" for="user">Email</label>
          <input id="user" type="email" autocomplete="username" required placeholder="usuario@empresa.com" />

          <label class="field-label" for="pass">Contraseña</label>
          <div class="password-wrap">
            <input id="pass" type="password" autocomplete="current-password" required placeholder="••••••••" />
            <button id="togglePassword" type="button" class="icon-btn">Mostrar</button>
          </div>

          <button id="loginBtn" class="primary-btn" type="submit">Ingresar</button>
          <p id="error" class="error-text" role="alert"></p>
        </form>
      </div>
    </section>

    <section id="appPage" class="page hidden">
      <aside id="drawer" class="drawer" aria-hidden="true">
        <div class="drawer-head">
          <h3>Menú</h3>
          <button id="closeDrawer" class="ghost-btn">Cerrar</button>
        </div>

        <div class="drawer-section">
          <h4>Historial de exports</h4>
          <div id="exportsHistory" class="exports-list"></div>
        </div>

        <div class="drawer-section">
          <h4>Gestión de categorías</h4>
          <div class="stack-8">
            <select id="categoryStoreSelect"></select>
            <div class="inline">
              <input id="newStoreInput" type="text" placeholder="Crear nueva tienda" />
              <button id="createStoreBtn" class="secondary-btn">Crear</button>
            </div>
            <div id="dropZone" class="drop-zone">Arrastrar XLSX o <label class="link-like" for="xlsxInput">seleccionar archivo</label></div>
            <input id="xlsxInput" type="file" accept=".xlsx,.xls" hidden />
            <div class="inline">
              <input id="catNameInput" type="text" placeholder="Nombre categoría" />
              <input id="catIdInput" type="number" placeholder="ID" />
              <button id="addCategoryBtn" class="secondary-btn">Agregar</button>
            </div>
            <div id="categoriesList" class="categories-list"></div>
          </div>
        </div>
      </aside>

      <main class="app-shell">
        <header class="topbar">
          <button id="burgerBtn" class="icon-round" aria-label="Abrir menú">☰</button>
          <div>
            <p class="eyebrow">Carga de productos</p>
            <h2 id="storeTitle">Tienda BNA</h2>
          </div>
          <select id="storeSelect"></select>
        </header>

        <div class="toolbar">
          <button id="addRowBtn" class="secondary-btn">+ Agregar fila</button>
          <button id="clearBtn" class="ghost-btn">Limpiar formulario</button>
          <button id="exportBtn" class="primary-btn">Exportar CSV</button>
        </div>

        <div class="table-wrap">
          <table id="productTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>

        <footer class="footer">
          <span>Tienditax</span>
          <button id="logoutBtn" class="ghost-btn">Cerrar sesión</button>
        </footer>
      </main>
    </section>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
