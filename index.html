<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienditax</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/wvwVpYgN/Gemini-Generated-Image-ho93mhho93mhho93-removebg-preview.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="loginPage" class="page page-center">
      <div class="card login-card">
        <img class="logo logo-xl" src="https://i.postimg.cc/wvwVpYgN/Gemini-Generated-Image-ho93mhho93mhho93-removebg-preview.png" alt="Tienditax" />
        <form id="loginForm" class="stack-12" novalidate action="javascript:void(0)">
          <label class="field-label" for="user">Usuario</label>
          <input id="user" type="text" autocomplete="username" required placeholder="usuario" />
          <label class="field-label" for="pass">Contraseña</label>
          <div class="password-wrap">
            <input id="pass" type="password" autocomplete="current-password" required placeholder="••••••••" />
            <button id="togglePassword" type="button" class="icon-btn">Mostrar</button>
          </div>
          <button id="loginBtn" class="primary-btn" type="submit">Ingresar</button>
          <p id="error" class="error-text" role="alert"></p>
        </form>
      </div>
    </section>

    <section id="appPage" class="page hidden">
      <aside id="drawer" class="drawer" aria-hidden="true">
        <div class="drawer-head">
          <h3>Menú</h3>
          <button id="closeDrawer" class="ghost-btn">Cerrar</button>
        </div>
        <div class="drawer-section stack-8">
          <button id="goProductsBtn" class="secondary-btn">Carga de productos</button>
          <button id="goCategoriesBtn" class="secondary-btn">Gestión de categorías</button>
          <button id="openHistoryBtn" class="secondary-btn">Historial de exports</button>
        </div>
      </aside>

      <main class="app-shell">
        <header class="topbar">
          <button id="burgerBtn" class="icon-round" aria-label="Abrir menú">☰</button>
          <div>
            <p class="eyebrow">Tienditax</p>
            <h2 id="viewTitle">Carga de productos</h2>
          </div>
          <select id="storeSelect"></select>
        </header>

        <section id="productView">
          <div class="toolbar">
            <button id="addRowBtn" class="secondary-btn">+ Agregar fila</button>
            <button id="clearBtn" class="ghost-btn">Limpiar formulario</button>
            <button id="exportBtn" class="primary-btn">Exportar CSV</button>
          </div>
          <div id="productGridWrap" class="table-wrap"></div>
        </section>

        <section id="categoryView" class="hidden">
          <div class="toolbar">
            <input id="catNameInput" type="text" placeholder="Nombre categoría" />
            <input id="catIdInput" type="number" placeholder="ID" />
            <button id="addCategoryBtn" class="secondary-btn">Agregar categoría</button>
            <label class="ghost-btn link-like" for="xlsxInput">Importar XLSX</label>
            <input id="xlsxInput" type="file" accept=".xlsx,.xls" hidden />
          </div>
          <div id="categoriesGridWrap" class="table-wrap"></div>
        </section>

        <footer class="footer">
          <span>Tienditax</span>
          <button id="logoutBtn" class="ghost-btn">Cerrar sesión</button>
        </footer>
      </main>
    </section>

    <div id="historyModal" class="modal hidden">
      <div class="modal-card">
        <div class="drawer-head">
          <h3>Historial de exports</h3>
          <button id="closeHistoryBtn" class="ghost-btn">Cerrar</button>
        </div>
        <div id="historyGridWrap"></div>
      </div>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
    <script>
      (function(){
        const form=document.getElementById("loginForm");
        const pass=document.getElementById("pass");
        const toggle=document.getElementById("togglePassword");
        if(toggle&&pass){
          toggle.addEventListener("click",function(){
            pass.type = pass.type === "password" ? "text" : "password";
            toggle.textContent = pass.type === "password" ? "Mostrar" : "Ocultar";
          });
        }
        if(form){
          form.addEventListener("submit",async function(ev){
            ev.preventDefault();
            if(typeof window.handleLogin === "function") await window.handleLogin();
          });
        }
      })();
    </script>
    <script type="module" src="app.js"></script>
  </body>
</html>
