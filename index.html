<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienditax</title>
    <link rel="icon" type="image/png" sizes="512x512" href="https://i.postimg.cc/4nkYkDNG/loguito-tienditax.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="https://i.postimg.cc/4nkYkDNG/loguito-tienditax.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  </head>
  <body>
    <div id="app">
      <section id="loginView" class="view active centered-view">
        <div class="card login-card">
          <img class="brand-logo" src="https://i.postimg.cc/7ZCqMsHy/tienditax-completo-logo.png" alt="Tienditax logo" />
          <label>Usuario</label>
          <input id="loginUser" type="text" placeholder="Usuario" autocomplete="username" />
          <label>Contraseña</label>
          <div class="password-wrap">
            <input id="loginPass" type="password" placeholder="Contraseña" autocomplete="current-password" />
            <button id="togglePass" type="button" class="link-btn">Mostrar</button>
          </div>
          <button id="loginBtn" class="ios-btn primary login-btn">Ingresar</button>
        </div>
      </section>

      <section id="storeView" class="view">
        <header class="topbar">
          <button id="menuBtn" class="icon-btn">☰</button>
          <span></span>
        </header>
        <div id="menuDrawer" class="drawer">
          <div class="drawer-content">
            <div class="drawer-header">
              <img class="drawer-logo" src="https://i.postimg.cc/4nkYkDNG/loguito-tienditax.png" alt="Tienditax" />
              <h3>Menú</h3>
              <button id="closeMenuBtn" class="icon-btn close-btn">✕</button>
            </div>
            <button id="menuHistorialBtn" class="ios-btn ghost">Historial</button>
            <button id="menuCategoriesBtn" class="ios-btn ghost">Categorías</button>
            <button id="menuConverterBtn" class="ios-btn ghost">Convertidor</button>
            <button id="menuCalendarBtn" class="ios-btn ghost">Calendario</button>
            <div class="preferences-panel drawer-preferences">
              <label class="setting-switch" for="themeToggleMenu">
                <span class="setting-label"><i class="bi bi-moon-stars"></i> Modo oscuro</span>
                <input id="themeToggleMenu" type="checkbox" />
                <span class="switch-track"></span>
              </label>
            </div>
            <div class="drawer-spacer"></div>
            <button id="menuLogoutBtn" class="ios-btn soft-danger">Cerrar sesión</button>
          </div>
        </div>
        <div id="storeButtons" class="store-grid"></div>
      </section>

      <section id="workspaceView" class="view">
        <header class="topbar workspace-topbar">
          <button id="workspaceMenuBtn" class="icon-btn">☰</button>
          <div class="title-wrap">
            <h2 id="workspaceTitle">Tienda</h2>
            <button id="changeStoreBtn" class="ios-btn primary small">Cambiar de tienda</button>
          </div>
          <div class="actions-wrap">
            <button id="clearFormBtn" class="ios-btn ghost small">Limpiar filas</button>
            <button id="exportBtn" class="ios-btn primary small">Exportar CSV</button>
          </div>
        </header>

        <div id="workspaceDrawer" class="drawer">
          <div class="drawer-content">
            <div class="drawer-header">
              <img class="drawer-logo" src="https://i.postimg.cc/4nkYkDNG/loguito-tienditax.png" alt="Tienditax" />
              <h3>Menú</h3>
              <button id="closeWorkspaceMenuBtn" class="icon-btn close-btn">✕</button>
            </div>
            <button id="workspaceHistorialBtn" class="ios-btn ghost">Historial</button>
            <button id="workspaceCategoriesBtn" class="ios-btn ghost">Categorías</button>
            <button id="workspaceConverterBtn" class="ios-btn ghost">Convertidor</button>
            <button id="workspaceCalendarBtn" class="ios-btn ghost">Calendario</button>
            <div class="preferences-panel drawer-preferences">
              <label class="setting-switch" for="themeToggleWorkspace">
                <span class="setting-label"><i class="bi bi-moon-stars"></i> Modo oscuro</span>
                <input id="themeToggleWorkspace" type="checkbox" />
                <span class="switch-track"></span>
              </label>
            </div>
            <div class="drawer-spacer"></div>
            <button id="workspaceLogoutBtn" class="ios-btn soft-danger">Cerrar sesión</button>
          </div>
        </div>

        <div id="tableTopScroll" class="table-top-scroll hidden"><div id="tableTopScrollInner"></div></div>
        <div id="tableContainer"></div>
      </section>

      <section id="categoriesView" class="view">
        <header class="topbar">
          <button id="categoriesBackBtn" class="icon-btn">←</button>
          <h2>Categorías</h2>
          <span></span>
        </header>
        <div class="card categories-card">
          <div class="field-row">
            <select id="categoryStoreSelect"></select>
          </div>
          <div class="field-row">
            <input id="catName" placeholder="nombre" />
            <input id="catId" placeholder="id numérico" type="number" min="0" />
          </div>
          <div class="field-row">
            <button id="addCategoryBtn" class="ios-btn">Agregar</button>
            <label class="file-upload ios-btn ghost">
              Importar XLSX
              <input id="xlsxInput" type="file" accept=".xlsx,.xls" />
            </label>
          </div>
          <div id="categoriesList" class="list"></div>
        </div>
      </section>
    </div>

    <footer class="hidden">
      <div id="footerLinksStack" class="footer-links-stack hidden">
        <a class="footer-link-btn" href="https://api.avenida.com/login" target="_blank" rel="noopener noreferrer">Avenida BNA</a>
        <a class="footer-link-btn" href="https://api-macro.avenida.com/login" target="_blank" rel="noopener noreferrer">Avenida MACRO</a>
        <a class="footer-link-btn" href="https://api.avenida.com/login" target="_blank" rel="noopener noreferrer">Avenida CIUDAD</a>
      </div>
      <img class="footer-logo" src="https://i.postimg.cc/4nkYkDNG/loguito-tienditax.png" alt="Tienditax" />
      <div class="footer-spacer"></div>
    </footer>

    <div id="historyModal" class="modal hidden">
      <div class="modal-card">
        <div class="drawer-header">
          <div class="history-header-actions">
            <button id="historyExportsTab" class="ios-btn ghost small active">Historial de exports</button>
            <button id="historyConversionsTab" class="ios-btn ghost small">Historial de conversión</button>
            <button id="historySessionsTab" class="ios-btn ghost small">Sesiones activas</button>
          </div>
          <button id="closeHistoryModal" class="icon-btn close-btn">✕</button>
        </div>
        <div id="historyPagination" class="history-pagination"></div>
        <div id="historyList" class="list"></div>
      </div>
    </div>

    <div id="converterModal" class="modal hidden">
      <div class="modal-card">
        <div class="drawer-header">
          <h3>Convertidor de archivos</h3>
          <button id="closeConverterModal" class="icon-btn close-btn">✕</button>
        </div>

        <div class="field-row converter-options-row">
          <div class="field-block converter-field-block">
            <label>Formato de origen</label>
            <select id="sourceFormatSelect">
              <option value="xlsx">XLSX</option>
              <option value="xls">XLS</option>
              <option value="csv">CSV</option>
              <option value="txt">TXT</option>
              <option value="json">JSON</option>
            </select>
          </div>
          <div class="field-block converter-field-block">
            <label>Formato de destino</label>
            <select id="targetFormatSelect">
              <option value="csv">CSV</option>
              <option value="xlsx">XLSX</option>
              <option value="txt">TXT</option>
              <option value="json">JSON</option>
            </select>
          </div>
        </div>

        <div class="field-row converter-files-row">
          <label class="file-upload ios-btn ghost">
            Importar archivos
            <input id="converterFilesInput" type="file" multiple />
          </label>
          <span id="converterFilesInfo" class="converter-files-info">Sin archivos seleccionados</span>
        </div>

        <div class="field-row">
          <button id="startConversionBtn" class="ios-btn primary">Convertir y exportar</button>
        </div>

        <div id="converterLogs" class="converter-logs"></div>
      </div>
    </div>

    <div id="calendarModal" class="modal hidden">
      <div class="modal-card calendar-modal-card">
        <div class="drawer-header">
          <h3>Calendario</h3>
          <button id="closeCalendarModal" class="icon-btn close-btn">✕</button>
        </div>
        <div class="calendar-layout">
          <div id="calendarContainer" class="calendar-shell"></div>
          <div class="calendar-event-panel">
            <h4 id="calendarFormTitle">Nuevo evento</h4>
            <div class="field-row">
              <input id="calendarEventTitle" type="text" placeholder="Título del evento" />
            </div>
            <div class="field-row">
              <textarea id="calendarEventDetails" placeholder="Detalle del evento"></textarea>
            </div>
            <div class="field-row">
              <input id="calendarEventStart" type="datetime-local" />
              <input id="calendarEventEnd" type="datetime-local" />
            </div>
            <div class="field-row calendar-color-row">
              <label class="calendar-color-picker" for="calendarEventColor">
                <input id="calendarEventColor" type="color" value="#0a53d0" aria-label="Elegir color del evento" />
                <span id="calendarColorPreview" class="calendar-color-preview" aria-hidden="true"></span>
                <span class="calendar-color-text">Color del evento</span>
              </label>
              <label class="calendar-all-day-label">
                <input id="calendarEventAllDay" type="checkbox" />
                Todo el día
              </label>
            </div>
            <div class="confirm-actions calendar-actions">
              <button id="calendarSaveBtn" class="ios-btn primary small">Guardar evento</button>
              <button id="calendarDeleteBtn" class="ios-btn danger small hidden">Eliminar</button>
              <button id="calendarCancelEditBtn" class="ios-btn ghost small hidden">Cancelar edición</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="storeSwitchModal" class="modal hidden">
      <div class="modal-card small-modal">
        <div class="drawer-header">
          <h3>Cambiar de tienda</h3>
          <button id="closeStoreSwitchModal" class="icon-btn close-btn">✕</button>
        </div>
        <div id="storeSwitchList" class="switch-list"></div>
      </div>
    </div>

    <div id="confirmDeleteModal" class="modal hidden">
      <div class="modal-card small-modal">
        <h3>¿Seguro que querés eliminar la categoría?</h3>
        <div class="confirm-actions">
          <button id="confirmDeleteBtn" class="ios-btn success small">Aceptar</button>
          <button id="cancelDeleteBtn" class="ios-btn danger small">Cancelar</button>
        </div>
      </div>
    </div>

    <div id="toastContainer"></div>

    <div id="loginLoadingOverlay" class="loading-overlay hidden" aria-hidden="true">
      <img src="https://i.postimg.cc/fbH7b8Vt/spinner-tienditax.png" alt="Cargando" class="loading-spinner" />
    </div>

    <template id="storeButtonTemplate">
      <button class="store-btn">
        <img alt="logo tienda" />
      </button>
    </template>

    <script src="app.js"></script>
  </body>
</html>
